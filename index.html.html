<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal Bulk Email Sender</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; background-color: #f9f9f9; }
        .card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        #drop-zone { border: 2px dashed #007bff; border-radius: 6px; padding: 30px; text-align: center; cursor: pointer; background: #f0f7ff; color: #007bff; font-weight: bold; }
        #drop-zone.hover { background: #e0efff; }
        textarea { width: 100%; height: 150px; margin-top: 10px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #28a745; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 4px; cursor: pointer; width: 100%; margin-top: 15px; }
        button:hover { background: #218838; }
        .status { margin-top: 15px; font-weight: bold; color: #555; }
        code { background: #eee; padding: 2px 4px; border-radius: 3px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>1. Paste Your Email Template</h2>
        <p>Use variables like <code>{Name}</code>, <code>{Address}</code>, and <code>{Location}</code>. Ensure these exactly match your CSV column headers.</p>
        <input type="text" id="email-subject" placeholder="Email Subject" style="width:100%; padding:10px; margin-bottom:10px; box-sizing:border-box;"><br>
        <textarea id="email-template" placeholder="Hello {Name},&#10;&#10;Your deployment at {Location} is confirmed for the address {Address}.&#10;&#10;Best regards,&#10;Management"></textarea>
    </div>

    <div class="card">
        <h2>2. Upload Employee Data (CSV)</h2>
        <div id="drop-zone">Drag & Drop your CSV file here or Click to Upload</div>
        <input type="file" id="file-input" accept=".csv" style="display: none;">
        <div id="file-info" class="status"></div>
    </div>

    <button id="send-btn" disabled>Send Emails via Gmail API</button>
    <div id="process-status" class="status"></div>

    <script>
        // Replace with your Web App URL after deploying Google Apps Script Step 2
        const WEB_APP_URL = 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL'; 

        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const fileInfo = document.getElementById('file-info');
        const sendBtn = document.getElementById('send-btn');
        const statusDiv = document.getElementById('process-status');
        
        let parsedData = [];

        // Drag and drop handlers
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('hover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('hover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('hover');
            handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

        // Simple CSV Parser
        function handleFile(file) {
            if (!file || !file.name.endsWith('.csv')) {
                alert('Please upload a valid CSV file.');
                return;
            }
            fileInfo.textContent = `Selected: ${file.name}`;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                parsedData = csvToArray(text);
                if(parsedData.length > 0) {
                    sendBtn.disabled = false;
                    statusDiv.textContent = `Ready to send to ${parsedData.length} recipients.`;
                }
            };
            reader.readAsText(file);
        }

        function csvToArray(str, delimiter = ",") {
            const headers = str.slice(0, str.indexOf("\n")).split(delimiter).map(h => h.trim().replace(/["']/g, ""));
            const rows = str.slice(str.indexOf("\n") + 1).split("\n");
            
            // Ensure Email column exists
            if (!headers.includes("Email")) {
                alert("CSV must include an 'Email' column.");
                return [];
            }

            return rows.map(function (row) {
                const values = row.split(delimiter).map(v => v.trim().replace(/["']/g, ""));
                if(values.length !== headers.length) return null;
                return headers.reduce(function (object, header, index) {
                    object[header] = values[index];
                    return object;
                }, {});
            }).filter(item => item !== null);
        }

        // Send Data to Backend
        sendBtn.addEventListener('click', async () => {
            const subject = document.getElementById('email-subject').value;
            const template = document.getElementById('email-template').value;
            
            if(!subject || !template) {
                alert("Please fill out the Subject and Template.");
                return;
            }

            sendBtn.disabled = true;
            statusDiv.textContent = "Sending emails... please wait.";

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Needed for cross-origin Apps Script execution
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ subject: subject, template: template, data: parsedData })
                });
                
                statusDiv.innerHTML = "<span style='color:green;'>Success! Instructions sent to Gmail Link. Check your Gmail Sent folder.</span>";
            } catch (error) {
                statusDiv.innerHTML = "<span style='color:red;'>Error sending emails. Check configuration.</span>";
                sendBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
